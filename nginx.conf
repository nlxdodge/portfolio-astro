# gzip settings
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_buffers 16 8k;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name gerbenveenhof.nl;

    root /usr/share/nginx/html;
    index index.html;

    port_in_redirect off;
    absolute_redirect off;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Astro static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(?:css|js|svg|jpg|jpeg|png|gif|ico|webp|avif|woff|woff2|map)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}